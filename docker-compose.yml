version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: blood4u_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: blood4u

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: blood4u_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/blood4u
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      COOKIE_EXPIRE: 7
      FRONTEND_URL: http://localhost:5173
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      ADMIN_LOGIN_ID: ${ADMIN_LOGIN_ID}
      ADMIN_DB_EMAIL: ${ADMIN_DB_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./Backend/logs:/usr/src/app/logs

  frontend:
    build:
      context: ./Auth
      dockerfile: Dockerfile
    container_name: blood4u_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
